services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aml
      POSTGRES_PASSWORD: aml
      POSTGRES_DB: aml_assistant
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aml -d aml_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://aml:aml@postgres:5432/aml_assistant
      OPENAI_API_KEY: ${OPENAI_API_KEY:-test-key}
      OPENAI_MODEL_ANALYSIS: ${OPENAI_MODEL_ANALYSIS:-gpt-4.1-mini}
      OPENAI_MODEL_REPORTS: ${OPENAI_MODEL_REPORTS:-gpt-4.1-mini}
      OPENAI_REQUEST_TIMEOUT_SECONDS: 30
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
